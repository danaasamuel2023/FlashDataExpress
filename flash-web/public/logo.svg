  <line x1="20" y1="100" x2="65" y2="100" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.4" />
  <line x1="30" y1="130" x2="70" y2="130" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.3" />
